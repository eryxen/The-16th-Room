<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冥婚 - MBTI 恐怖游戏 Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            line-height: 1.8;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { 
            text-align: center; 
            color: #8b0000;
            font-size: 2em;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #ff0000;
        }
        .screen { display: none; }
        .screen.active { display: block; }
        
        /* 问卷样式 */
        .question {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 3px solid #8b0000;
        }
        .question h3 { margin-bottom: 15px; color: #ff6b6b; }
        .options button {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 1em;
            text-align: left;
        }
        .options button:hover {
            background: #3a3a3a;
            border-color: #8b0000;
        }
        
        /* 结果样式 */
        .mbti-result {
            text-align: center;
            padding: 30px;
            background: linear-gradient(180deg, #1a0000 0%, #0a0a0a 100%);
            border-radius: 15px;
            border: 2px solid #8b0000;
        }
        .mbti-type {
            font-size: 4em;
            color: #ff4444;
            text-shadow: 0 0 20px #ff0000;
        }
        .mbti-desc {
            color: #aaa;
            margin: 20px 0;
            font-style: italic;
        }
        
        /* 剧情样式 */
        .story {
            background: #111;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #333;
            min-height: 300px;
        }
        .story-text {
            font-size: 1.1em;
            margin-bottom: 25px;
            white-space: pre-line;
        }
        .choice-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: linear-gradient(90deg, #2a1a1a, #1a1a1a);
            border: 1px solid #8b0000;
            color: #ff6b6b;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }
        .choice-btn:hover {
            background: linear-gradient(90deg, #3a2a2a, #2a1a1a);
            box-shadow: 0 0 15px rgba(139,0,0,0.5);
        }
        
        /* 恐怖特效 */
        .glitch {
            animation: glitch 0.5s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .flash {
            animation: flash 0.1s;
        }
        @keyframes flash {
            0%, 100% { background: #0a0a0a; }
            50% { background: #fff; }
        }
        
        .start-btn {
            display: block;
            width: 200px;
            margin: 40px auto;
            padding: 20px;
            background: #8b0000;
            border: none;
            color: #fff;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .start-btn:hover {
            background: #a00000;
            box-shadow: 0 0 20px #ff0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕯️ 冥婚 🕯️</h1>
        
        <!-- 开始画面 -->
        <div id="start-screen" class="screen active">
            <p style="text-align: center; margin: 40px 0; color: #888;">
                你相信...命运吗？<br><br>
                当红线绑住两个人，<br>
                活着的人...或者已故的人，<br>
                都无法逃脱。
            </p>
            <button class="start-btn" onclick="startGame()">开始测试</button>
        </div>
        
        <!-- 问卷画面 -->
        <div id="quiz-screen" class="screen">
            <div id="questions"></div>
        </div>
        
        <!-- 结果画面 -->
        <div id="result-screen" class="screen">
            <div class="mbti-result">
                <p>你的 MBTI 类型</p>
                <div class="mbti-type" id="mbti-type">???</div>
                <p class="mbti-desc" id="mbti-desc"></p>
                <button class="start-btn" onclick="startStory()">进入故事</button>
            </div>
        </div>
        
        <!-- 剧情画面 -->
        <div id="story-screen" class="screen">
            <div class="story">
                <p class="story-text" id="story-text"></p>
                <div class="choices" id="choices"></div>
            </div>
        </div>
    </div>

    <script>
        // MBTI 问题
        const questions = [
            {
                q: "1. 你独自走在荒废的古宅里，突然听到脚步声，你会：",
                options: [
                    { type: "E", text: "大声问：谁在那里？" },
                    { type: "I", text: "屏住呼吸，悄悄躲起来" }
                ]
            },
            {
                q: "2. 你发现桌上有一本泛黄的日记，你会：",
                options: [
                    { type: "S", text: "仔细检查日记的材质、年份、细节" },
                    { type: "N", text: "直觉这是重要的线索，快速翻开" }
                ]
            },
            {
                q: "3. 面前出现两条路，一条通往光亮的大厅，一条通往黑暗的地下室：",
                options: [
                    { type: "J", text: "选择一条，果断走下去" },
                    { type: "P", text: "两边都查看一下再做决定" }
                ]
            },
            {
                q: "4. 你感受到一股寒意，像是有人在你耳边轻声低语：",
                options: [
                    { type: "T", text: "冷静分析：这一定是风声/心理作用" },
                    { type: "F", text: "感到不安：这可能是某种警告" }
                ]
            }
        ];
        
        // MBTI 描述
        const mbtiDescs = {
            "INTJ": "冷静的策划者。你会分析诅咒的规则，找出破除之法。",
            "INTP": "好奇的研究者。你会追查仪式的来源，试图理解一切。",
            "ENTJ": "果断的领袖。你会带领其他人，或者独自对抗。",
            "ENTP": "机智的挑战者。你会试图与"它"谈判。",
            "INFJ": "敏感的先知。你能感受到常人不易察觉的存在。",
            "INFP": "浪漫的理想者。你可能会被情感所困，也可能是破局关键。",
            "ENFJ": "温暖的治疗者。你会试图拯救他人，即使牺牲自己。",
            "ENFP": "热情的探险者。你会寻找每一个可能的出路。",
            "ISTJ": "严谨的守护者。你会遵守规则，试图安全生存。",
            "ISFJ": "忠诚的守护者。你会保护同伴，即使代价是自己。",
            "ESTJ": "实际的组织者。你会制定计划，带领团队。",
            "ESFJ": "关怀的照顾者。你会照顾伤者，团结大家。",
            "ISTP": "冷静的生存者。你会随机应变，独自行动。",
            "ISFP": "敏感的艺术家。你会注意到别人忽略的美与恐怖。",
            "ESTP": "大胆的行动者。你会冒险尝试，快速反应。",
            "ESFP": "热情的表演者。你会保持乐观，给大家带来希望。"
        };
        
        // 剧情数据
        const storyData = {
            "start": {
                text: `你在一阵刺耳的唢呐声中醒来。

眼前是一间老旧的婚房，大红蜡烛摇曳着诡异的光芒。窗花是褪色的红，桌上摆着合卺酒——两只酒杯用红线连在一起。

门外传来脚步声，还有...笑声？

你低头看自己——身上穿着新郎的礼服。`,
                choices: [
                    { next: "door", text: "🚪 悄悄走到门边偷看" },
                    { next: "window", text: "🪟 试图从窗户逃跑" },
                    { next: "table", text: "🪶 检查桌上的东西" }
                ]
            },
            "door": {
                text: `你轻手轻脚走到门边，从门缝往外看。

走廊里站着一排人，他们都穿着古装，脸上带着诡异的笑。最前面站着一位穿着嫁衣的女子，背对着你。

她突然开口："相公...你来了..."

她的头缓缓转动——180度——向你转来。

那张脸——是你自己的脸！`,
                choices: [
                    { next: "run", text: "🏃 转身就跑！" },
                    { next: "speak", text: "💬 尝试与她对话" }
                ]
            },
            "window": {
                text: `你跑到窗边，用力推——窗户纹丝不动。

外面不是街道，而是一片浓雾。雾中隐约可见红色的灯笼，还有...一个个穿着嫁衣的人影。

他们都在看着你。

"相公..."身后传来轻柔的声音。

你慢慢回头——`,
                choices: [
                    { next: "fight", text: "⚔️ 拿起桌上的酒杯防身" },
                    { next: "accept", text: "💀 接受命运" }
                ]
            },
            "table": {
                text: `你走到桌边。合卺酒旁边放着一张泛黄的纸条：

"既已成婚，勿要负心。若要离去，需找到信物。"

除此之外，还有一枚玉佩和一把剪刀。

外面的脚步声越来越近...`,
                choices: [
                    { next: "jade", text: "🪨 拿起玉佩" },
                    { next: "scissors", text: "✂️ 拿起剪刀" }
                ]
            },
            "run": {
                text: `你冲出门，沿着走廊拼命奔跑。

但这条路像是没有尽头——无论你跑多快，两边的景色永远一样。

突然，你停下了。

因为你看到了自己——穿着新郎礼服，站在走廊尽头，微微笑着。

"你想跑去哪里？" 那个"你"问道。

"我们...已经结婚了呀。"`,
                choices: [
                    { next: "accept", text: "💀 接受命运" },
                    { next: "jade", text: "🪨 拿出玉佩（如果你有）" }
                ]
            },
            "speak": {
                text: `"你...你是谁？"你颤抖着问。

那张和你一样的脸笑了："我是谁？你不记得了吗？"

"是你...答应的聘礼。是你...签下的婚书。是你...答应的永远不会离开。"

她的眼眶流出血泪："可是你...背叛了誓言。"`,
                choices: [
                    { next: "explain", text: "💬 解释这是个误会" },
                    { next: "fight", text: "⚔️ 反击" }
                ]
            },
            "jade": {
                text: `你拿起玉佩的瞬间，整个房间剧烈震动。

红色的光芒从玉佩中散发出来。嫁衣女子后退了一步，露出痛苦的表情。

"不...不要这个..."

玉佩上刻着四个字：死生相许。

这是...誓言的证明。`,
                choices: [
                    { next: "break", text: "💥 摔碎玉佩" },
                    { next: "keep", text: "📿 戴上玉佩" }
                ]
            },
            "scissors": {
                text: `你抓起剪刀。

嫁衣女子笑了——笑得越来越大声，越来越刺耳。

"你想...伤害我？"

她的身体开始扭曲，四肢以不可能的角度弯曲。

"我们是夫妻啊...夫妻之间...怎么能互相伤害呢？"

她扑了过来——`,
                choices: [
                    { next: "stab", text: "✂️ 刺下去" },
                    { next: "accept", text: "💀 不反抗" }
                ]
            },
            "accept": {
                text: `【结局：冥婚新娘】

你接受了命运。

嫁衣女子笑了，美丽而凄凉。她轻轻握住你的手。

"这样...就好。"

红烛熄灭。

当你再次睁眼，你发现自己也穿上了嫁衣，坐在同样的房间里。

窗外，唢呐声响起。

下一个轮回...开始了。`,
                choices: [
                    { next: "start", text: "🔄 重新开始" }
                ]
            },
            "break": {
                text: `【结局：破局】

你用力摔碎玉佩。

一声巨响，红光爆发。嫁衣女子发出尖叫，身体开始消散。

"不...不可能..."

"没有人能打破誓言..."

她的声音越来越远。

你成功了。

当你再次睁眼，发现自己躺在床上——是普通的卧室，阳光从窗外照进来。

原来...是场梦？

但你枕头边，放着一枚玉佩。

刻着：死生相许。`,
                choices: [
                    { next: "start", text: "🔄 重新开始" }
                ]
            },
            "keep": {
                text: `【结局：共生】

你戴上玉佩。

神奇的事情发生了——你的身体变得轻盈，那个"她"融入了你。

"这样...我们就永远在一起了。"

你成为了她的一部分。

或者说她成为了你。

你们...不再分离。`,
                choices: [
                    { next: "start", text: "🔄 重新开始" }
                ]
            }
        };
        
        let currentAnswers = [];
        let currentQuestion = 0;
        
        function startGame() {
            showScreen('quiz-screen');
            showQuestion();
        }
        
        function showQuestion() {
            const q = questions[currentQuestion];
            let html = `<div class="question"><h3>${q.q}</h3><div class="options">`;
            q.options.forEach((opt, i) => {
                html += `<button onclick="answer('${opt.type}')">${opt.text}</button>`;
            });
            html += `</div></div>`;
            document.getElementById('questions').innerHTML = html;
        }
        
        function answer(type) {
            currentAnswers.push(type);
            currentQuestion++;
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }
        
        function showResult() {
            // 计算 MBTI
            const ei = currentAnswers[0];
            const sn = currentAnswers[1];
            const jp = currentAnswers[2];
            const tf = currentAnswers[3];
            const mbti = ei + sn + jp + tf;
            
            document.getElementById('mbti-type').textContent = mbti;
            document.getElementById('mbti-desc').textContent = mbtiDescs[mbti] || "你是一个独特的个体。";
            
            showScreen('result-screen');
        }
        
        function startStory() {
            showScreen('story-screen');
            showStoryNode('start');
        }
        
        function showStoryNode(nodeId) {
            const node = storyData[nodeId];
            document.getElementById('story-text').textContent = node.text;
            
            let html = '';
            node.choices.forEach(choice => {
                html += `<button class="choice-btn" onclick="showStoryNode('${choice.next}')">${choice.text}</button>`;
            });
            document.getElementById('choices').innerHTML = html;
        }
        
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
