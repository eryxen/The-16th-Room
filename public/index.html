<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00f0ff">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏚️</text></svg>">
    <title>THE 16TH ROOM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--cyan:#00f0ff;--mag:#ff00ff;--pink:#ff2a6d;--panel:rgba(12,12,20,.95)}
html,body{height:100%}
body{
    padding-top:max(env(safe-area-inset-top,0px),44px);
    padding-bottom:env(safe-area-inset-bottom,0px);
    background:linear-gradient(180deg,#0a0a12,#050508);
    color:#fff;font-family:'Orbitron',sans-serif;
    overflow:hidden
}
.screen{position:fixed;top:0;left:0;right:0;bottom:0;display:none;padding:20px;padding-top:max(env(safe-area-inset-top,0px),44px)}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
.container{max-width:420px;width:100%;text-align:center}
.panel{background:linear-gradient(145deg,#16161f,#0d0d15);border-radius:16px;box-shadow:8px 8px 20px rgba(0,0,0,.6),-4px -4px 12px rgba(0,240,255,.02),inset 0 1px 0 rgba(255,255,255,.05);border:1px solid #252535;padding:24px;margin-bottom:16px}
.logo h1{font-size:1.8rem;font-weight:900;color:var(--cyan);text-shadow:0 0 15px var(--cyan),0 0 30px var(--cyan);margin-bottom:8px;letter-spacing:4px;animation:glitch 3s infinite}
.logo .sub{font-size:.65rem;color:var(--mag);letter-spacing:3px;text-transform:uppercase}
.warning{border:1px solid var(--pink);animation:bGlitch 4s infinite}
.warning h3{color:var(--pink);font-size:.85rem;letter-spacing:2px;margin-bottom:12px;text-shadow:0 0 10px var(--pink)}
.warning p{color:#a0a0b0;font-size:.7rem;line-height:1.6;margin-bottom:6px;font-family:sans-serif}
.btn{padding:14px 32px;border:none;border-radius:10px;font-family:'Orbitron',sans-serif;font-size:.8rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;background:linear-gradient(145deg,#1a1a28,#101018);box-shadow:4px 4px 12px rgba(0,0,0,.5);border:1px solid #252535;color:var(--cyan);-webkit-tap-highlight-color:transparent}
.btn:hover{background:linear-gradient(145deg,#00f0ff,#00b8c4);color:#000;box-shadow:0 0 20px var(--cyan)}
.btn:active{transform:scale(.96)}
.btn-red{border-color:var(--pink);color:var(--pink)}
.btn-red:hover{background:var(--pink);color:#000}
.test-title{color:var(--cyan);font-size:.9rem;margin-bottom:16px;letter-spacing:2px}
.pbar{width:100%;height:3px;background:rgba(0,240,255,.1);border-radius:2px;margin-bottom:16px;overflow:hidden}
.pbar .fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--mag));transition:width .3s}
#q-text{font-size:.95rem;margin-bottom:16px;color:#fff;min-height:50px;padding:10px;line-height:1.5;font-family:sans-serif}
.opts{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.opt{padding:14px 16px;background:linear-gradient(145deg,#16161f,#0d0d15);border:1px solid #252535;border-radius:10px;cursor:pointer;text-align:left;font-size:.85rem;color:#c0c0d0;transition:all .2s;font-family:sans-serif;-webkit-tap-highlight-color:transparent}
.opt:hover{border-color:var(--cyan);color:var(--cyan)}
.opt.sel{border-color:var(--cyan);background:linear-gradient(145deg,#1a2030,#101420);color:var(--cyan);box-shadow:0 0 15px rgba(0,240,255,.2)}
.nav{display:flex;justify-content:space-between;align-items:center}
.counter{color:var(--mag);font-size:.8rem}
.badge{font-size:2rem;color:var(--cyan);text-shadow:0 0 15px var(--cyan)}
.npc-n{color:var(--pink);font-size:1rem;margin-bottom:6px}
.npc-d{color:#808090;font-size:.8rem;line-height:1.4;font-family:sans-serif}
.scenario{background:linear-gradient(145deg,#151520,#0d0d14);border-left:3px solid var(--mag);padding:14px;margin:16px 0;text-align:left;font-style:italic;color:#a0a0b0;font-size:.8rem;font-family:sans-serif;border-radius:0 8px 8px 0}
.fg{margin-bottom:14px;text-align:left}
.fg label{display:block;color:var(--mag);font-size:.75rem;margin-bottom:6px}
.fg input{width:100%;padding:12px;background:#1a1a2a;border-radius:8px;color:#fff;border:1px solid #252535;font-family:inherit;font-size:.85rem}
.fg input:focus{outline:none;border-color:var(--cyan)}
.gbtns{display:flex;gap:8px}
.gbtn{flex:1;padding:10px;background:linear-gradient(145deg,#16161f,#0d0d15);border:1px solid #252535;border-radius:8px;text-align:center;cursor:pointer;color:#808090;font-size:.85rem;transition:all .2s;-webkit-tap-highlight-color:transparent}
.gbtn:hover{border-color:var(--mag);color:var(--mag)}
.gbtn.sel{border-color:var(--pink);background:linear-gradient(145deg,#201520,#140d14);color:var(--pink)}
.chatbox{max-width:420px;width:100%;height:100%;display:flex;flex-direction:column}
.chtop{display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--panel);border-bottom:1px solid var(--cyan);border-radius:12px 12px 0 0;font-size:.8rem}
.chtop .t{color:var(--cyan)}
.chtop .ind{color:var(--mag);font-size:.7rem}
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:12px;border-radius:10px;font-family:sans-serif;font-size:.9rem;line-height:1.5}
.msg.u{background:rgba(0,240,255,.1);border:1px solid var(--cyan);align-self:flex-end}
.msg.a{background:var(--panel);border:1px solid rgba(0,240,255,.2);align-self:flex-start}
.msg .snd{color:var(--mag);font-size:.7rem;margin-bottom:6px;font-family:'Orbitron',sans-serif}
.chinp{display:flex;padding:10px;background:var(--panel);border-top:1px solid rgba(0,240,255,.3);gap:8px}
.chinp input{flex:1;padding:10px;background:#1a1a2a;border:1px solid #252535;border-radius:6px;color:#fff;font-size:.9rem;font-family:sans-serif}
.chinp input:focus{outline:none;border-color:var(--cyan)}
.chinp .btn{padding:10px 14px}
.chbot{display:flex;justify-content:space-between;padding:8px;background:var(--panel);border-radius:0 0 12px 12px}
.loader{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:999}
.loader.off{display:none}
.spin{width:40px;height:40px;border:2px solid #252535;border-top:2px solid var(--cyan);border-radius:50%;animation:sp .8s linear infinite}
@keyframes glitch{0%,90%,100%{text-shadow:0 0 15px var(--cyan),0 0 30px var(--cyan)}92%{text-shadow:-2px 0 var(--mag),2px 0 var(--cyan)}94%{text-shadow:2px 0 var(--mag),-2px 0 var(--cyan)}}
@keyframes bGlitch{0%,100%{border-color:var(--pink);box-shadow:0 0 10px rgba(255,42,109,.3)}33%{border-color:var(--cyan);box-shadow:0 0 15px rgba(0,240,255,.4)}66%{border-color:var(--mag);box-shadow:0 0 15px rgba(255,0,255,.4)}}
@keyframes sp{to{transform:rotate(360deg)}}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.06),rgba(0,0,0,.06) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:9999}
@media(max-width:450px){.logo h1{font-size:1.4rem}.panel{padding:16px}}
    </style>
</head>
<body>
    <div class="screen active" id="s-welcome">
        <div class="container">
            <div class="panel logo"><h1>THE 16TH ROOM</h1><p class="sub">Personalized Horror AI Experience</p></div>
            <div class="panel warning">
                <h3>⚠️ 心理恐怖体验警告</h3>
                <p>本应用将根据您的MBTI人格类型，创造针对性的心理恐怖体验</p>
                <p>如果您有严重的心理健康问题，请谨慎使用</p>
            </div>
            <button class="btn" id="btn-start">开始心理测试</button>
        </div>
    </div>
    <div class="screen" id="s-test">
        <div class="container panel">
            <h2 class="test-title">🧠 MBTI人格检测</h2>
            <div class="pbar"><div class="fill" id="prog"></div></div>
            <div id="q-text"></div>
            <div class="opts" id="q-opts"></div>
            <div class="nav">
                <button class="btn" style="padding:8px 16px;font-size:.7rem" id="btn-prev">上一题</button>
                <span class="counter" id="cnt">1 / 12</span>
                <button class="btn" style="padding:8px 16px;font-size:.7rem" id="btn-next">下一题</button>
            </div>
        </div>
    </div>
    <div class="screen" id="s-result">
        <div class="container panel">
            <h2 class="test-title">🔮 人格分析完成</h2>
            <div style="display:flex;justify-content:center;align-items:center;gap:20px;margin:16px 0">
                <div><p style="color:#666;font-size:.7rem;margin-bottom:8px">您的MBTI</p><div class="badge" id="r-type"></div></div>
                <div style="color:var(--mag)">→</div>
                <div><p style="color:#666;font-size:.7rem;margin-bottom:8px">恐怖对手</p><div class="npc-n" id="r-npc"></div><div class="npc-d" id="r-desc"></div></div>
            </div>
            <div class="scenario" id="r-scene"></div>
            <button class="btn" id="btn-enter">进入恐怖房间</button>
        </div>
    </div>
    <div class="screen" id="s-char">
        <div class="container panel">
            <h2 class="test-title">👤 创建角色</h2>
            <div class="fg"><label for="inp-name">昵称</label><input type="text" id="inp-name" placeholder="输入昵称" maxlength="20"></div>
            <div class="fg"><label>性别</label>
                <div class="gbtns"><div class="gbtn" data-g="male">♂ 男性</div><div class="gbtn" data-g="female">♀ 女性</div><div class="gbtn" data-g="other">⚥ 其他</div></div>
            </div>
            <button class="btn btn-red" id="btn-chat">开始恐怖体验</button>
        </div>
    </div>
    <div class="screen" id="s-chat">
        <div class="chatbox">
            <div class="chtop"><span class="t">🏚️ THE 16TH ROOM</span><span class="ind" id="ch-ind"></span></div>
            <div class="msgs" id="msgs"></div>
            <div class="chinp"><input type="text" id="inp-msg" placeholder="输入您的回应..."><button class="btn" id="btn-send">发送</button></div>
            <div class="chbot">
                <button class="btn" style="padding:6px 12px;font-size:.65rem" id="btn-restart">重新开始</button>
                <button class="btn btn-red" style="padding:6px 12px;font-size:.65rem" id="btn-escape">逃离房间</button>
            </div>
        </div>
    </div>
    <div class="loader off" id="loader"><div class="spin"></div></div>
    <script src="app.js"></script>
</body>
</html>
