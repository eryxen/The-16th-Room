<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00f0ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏚️</text></svg>">
    <title>THE 16TH ROOM - MBTI Horror</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
:root { 
    --bg: #0a0a12; 
    --cyan: #00f0ff; 
    --magenta: #ff00ff; 
    --pink: #ff2a6d;
    --panel: rgba(12, 12, 20, 0.95);
}

body { padding-top: env(safe-area-inset-top, 25px) !important; padding-left: env(safe-area-inset-left, 10px); padding-right: env(safe-area-inset-right, 10px); padding-bottom: env(safe-area-inset-bottom, 10px);  padding-top: 25px;  padding-top: env(safe-area-inset-top, 20px);  
    background: linear-gradient(180deg, #0a0a12 0%, #050508 100%);
    background-color: var(--bg);
    color: #ffffff !important; background-color: #222222 !important; 
    font-family: 'Orbitron', sans-serif; 
    min-height: 100vh; 
    overflow: hidden;
    perspective: 800px;
}

.screen { 
    position: fixed; 
    inset: 0; 
    display: none; 
    padding: 20px;
    transform-style: preserve-3d;
}
.screen.active { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
}

/* Soft Embossed Container */
.container { 
    max-width: 420px; 
    width: 100%; 
    text-align: center;
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out;
}

.panel {
    background: linear-gradient(145deg, #16161f, #0d0d15);
    border-radius: 16px;
    box-shadow: 
        8px 8px 20px rgba(0,0,0,0.6),
        -4px -4px 12px rgba(0,240,255,0.02),
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -1px 0 rgba(0,0,0,0.4);
    border: 1px solid #252535;
    padding: 24px;
    margin-bottom: 16px;
}

/* Title */
.logo h1 {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 15px var(--cyan), 0 0 30px var(--cyan), 0 0 45px rgba(0,240,255,0.5);
    margin-bottom: 8px;
    letter-spacing: 4px;
    animation: glitchText 3s infinite;
}

.logo .subtitle {
    font-size: 0.65rem;
    color: var(--magenta);
    letter-spacing: 3px;
    text-transform: uppercase;
}

/* Warning */
.warning {
    border: 1px solid var(--pink);
    animation: borderGlitch 4s infinite;
}

.warning h3 {
    color: var(--pink);
    font-size: 0.85rem;
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-shadow: 0 0 10px var(--pink);
}

.warning p {
    color: #a0a0b0;
    font-size: 0.7rem;
    line-height: 1.6;
    margin-bottom: 6px;
}

/* Buttons - Soft Embossed */
.btn {
    padding: 14px 32px;
    border: none;
    border-radius: 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    
    background: linear-gradient(145deg, #1a1a28, #101018);
    box-shadow: 
        4px 4px 12px rgba(0,0,0,0.5),
        -2px -2px 6px rgba(0,240,255,0.02),
        inset 0 1px 0 rgba(255,255,255,0.05);
    border: 1px solid #252535;
    color: var(--cyan);
}

.btn:hover {
    background: linear-gradient(145deg, #00f0ff, #00b8c4);
    color: #000;
    box-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,240,255,0.4);
    transform: translateY(-2px);
}

.btn:active {
    transform: translateY(0);
    box-shadow: 0 0 10px var(--cyan);
}

.btn-red { border-color: var(--pink); color: var(--pink); }
.btn-red:hover { background: var(--pink); color: #000; box-shadow: 0 0 20px var(--pink); }

/* Test */
.test-title { color: var(--cyan); font-size: 0.9rem; margin-bottom: 16px; letter-spacing: 2px; }

.progress-bar {
    width: 100%;
    height: 3px;
    background: rgba(0,240,255,0.1);
    border-radius: 2px;
    margin-bottom: 16px;
    overflow: hidden;
}
.progress { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--magenta)); transition: width 0.3s; }

.question-text {
    font-size: 0.95rem;
    margin-bottom: 16px;
    color: #fff !important;
    min-height: 50px;
    display: block;
    padding: 10px;
    line-height: 1.5;
}

.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

.option-btn {
    padding: 14px 16px;
    background: linear-gradient(145deg, #16161f, #0d0d15);
    border: 1px solid #252535;
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    font-size: 0.85rem;
    color: #c0c0d0;
    transition: all 0.2s ease;
    box-shadow: 4px 4px 10px rgba(0,0,0,0.4);
}

.option-btn:hover {
    border-color: var(--cyan);
    background: linear-gradient(145deg, #1a2030, #101420);
    color: var(--cyan);
    transform: translateY(-2px);
}

.option-btn.selected {
    border-color: var(--cyan);
    background: linear-gradient(145deg, #1a2030, #101420);
    color: var(--cyan);
    box-shadow: inset 2px 2px 6px rgba(0,0,0,0.4), 0 0 15px rgba(0,240,255,0.2);
}

.nav { display: flex; justify-content: space-between; align-items: center; }
.counter { color: var(--magenta); font-size: 0.8rem; }

/* Result */
.type-badge { font-size: 2rem; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); }
.npc-name { color: var(--pink); font-size: 1rem; margin-bottom: 6px; }
.npc-desc { color: #808090; font-size: 0.8rem; line-height: 1.4; }
.scenario { 
    background: linear-gradient(145deg, #151520, #0d0d14); 
    border-left: 3px solid var(--magenta); 
    padding: 14px; 
    margin: 16px 0; 
    text-align: left; 
    font-style: italic; 
    color: #a0a0b0; 
    font-size: 0.8rem;
}

/* Form */
.form-group { margin-bottom: 14px; text-align: left; }
.form-group label { display: block; color: var(--magenta); font-size: 0.75rem; margin-bottom: 6px; }
.form-group input { 
    width: 100%; padding: 12px; background: #1a1a2a; border-radius: 8px; 
    color: #ffffff !important; background-color: #222222 !important; border: 1px solid #252535; font-family: inherit;
}
.form-group input:focus { outline: none; border-color: var(--cyan); }

.gender-btns { display: flex; gap: 8px; }
.gender-btn {
    flex: 1; padding: 10px; background: linear-gradient(145deg, #16161f, #0d0d15);
    border: 1px solid #252535; border-radius: 8px; text-align: center;
    cursor: pointer; color: #808090; font-size: 0.85rem; transition: all 0.2s;
}
.gender-btn:hover { border-color: var(--magenta); color: var(--magenta); }
.gender-btn.selected { border-color: var(--pink); background: linear-gradient(145deg, #201520, #140d14); color: var(--pink); }

/* Chat */
.chat-container { max-width: 420px; width: 100%; height: 100vh; display: flex; flex-direction: column; }
.chat-header { display: flex; justify-content: space-between; padding: 12px; background: var(--panel); border-bottom: 1px solid var(--cyan); border-radius: 12px 12px 0 0; }
.chat-title { color: var(--cyan); font-size: 0.8rem; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
.chat-msg { max-width: 85%; padding: 12px; border-radius: 10px; }
.chat-msg.user { background: rgba(0,240,255,0.1); border: 1px solid var(--cyan); align-self: flex-end; }
.chat-msg.ai { background: var(--panel); border: 1px solid rgba(0,240,255,0.2); align-self: flex-start; }
.chat-sender { color: var(--magenta); font-size: 0.7rem; margin-bottom: 6px; }
.chat-input { display: flex; padding: 10px; background: var(--panel); border-top: 1px solid var(--cyan); }
.chat-input input { flex: 1; padding: 10px; background: #1a1a2a; border: 1px solid #252535; border-radius: 6px; color: #ffffff !important; background-color: #222222 !important; }
.chat-input input:focus { outline: none; border-color: var(--cyan); }
.chat-input .btn { padding: 10px 14px; margin-left: 8px; }
.chat-controls { display: flex; justify-content: space-between; padding: 8px; background: #1a1a2a; }

/* Loading */
.loader { position: fixed; inset: 0; inset-top: 50px !important; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 999; }
.loader.hidden { display: none; }
.spin { width: 40px; height: 40px; border: 2px solid #252535; border-top: 2px solid var(--cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }

/* Glitch Animations */
@keyframes glitchText {
    0%, 90%, 100% { text-shadow: 0 0 15px var(--cyan), 0 0 30px var(--cyan); }
    92% { text-shadow: -2px 0 var(--magenta), 2px 0 var(--cyan); }
    94% { text-shadow: 2px 0 var(--magenta), -2px 0 var(--cyan); }
}

@keyframes borderGlitch {
    0%, 100% { border-color: var(--pink); box-shadow: 0 0 10px rgba(255,42,109,0.3); }
    33% { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,240,255,0.4); }
    66% { border-color: var(--magenta); box-shadow: 0 0 15px rgba(255,0,255,0.4); }
}

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* CRT Scanlines */
body::after {
    content: ''; position: fixed; inset: 0; inset-top: 50px !important;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
    pointer-events: none; z-index: 9999;
}

/* Mobile */
@media(max-width: 450px) {
    .logo h1 { font-size: 1.4rem; }
    .panel { padding: 16px; }
}
    </style>
</head>
<body>
    <!-- Welcome -->
    <div class="screen active" id="welcome-screen">
        <div class="container">
            <div class="panel logo">
                <h1>THE 16TH ROOM</h1>
                <p class="subtitle">Personalized Horror AI Experience</p>
            </div>
            <div class="panel warning">
                <h3>⚠️ 心理恐怖体验警告</h3>
                <p>本应用将根据您的MBTI人格类型，创造针对性的心理恐怖体验</p>
                <p>如果您有严重的心理健康问题，请谨慎使用</p>
            </div>
            <button id="start-btn" class="btn" onclick="startTest(); return false;">开始心理测试</button>
        </div>
    </div>

    <!-- Test -->
    <div class="screen" id="test-screen">
        <div class="container panel">
            <h2 class="test-title">🧠 MBTI人格检测</h2>
            <div class="progress-bar"><div class="progress" id="progress"></div></div>
            <div class="question-text" id="q-text"></div>
            <div class="options" id="q-opts"></div>
            <div class="nav">
                <button class="btn" style="padding:8px 16px;font-size:0.7rem" onclick="prevQ()">上一题</button>
                <span class="counter" id="counter">1 / 12</span>
                <button class="btn" style="padding:8px 16px;font-size:0.7rem" onclick="nextQ()">下一题</button>
            </div>
        </div>
    </div>

    <!-- Result -->
    <div class="screen" id="result-screen">
        <div class="container panel">
            <h2 class="test-title">🔮 人格分析完成</h2>
            <div style="display:flex;justify-content:center;align-items:center;gap:20px;margin:16px 0">
                <div><p style="color:#666;font-size:0.7rem;margin-bottom:8px">您的MBTI</p><div class="type-badge" id="u-type"></div></div>
                <div style="color:var(--magenta)">→</div>
                <div><p style="color:#666;font-size:0.7rem;margin-bottom:8px">恐怖对手</p><div class="npc-name" id="npc-name"></div><div class="npc-desc" id="npc-desc"></div></div>
            </div>
            <div class="scenario" id="scenario"></div>
            <button class="btn" onclick="showChar()">进入恐怖房间</button>
        </div>
    </div>

    <!-- Character -->
    <div class="screen" id="char-screen">
        <div class="container panel">
            <h2 class="test-title">👤 创建角色</h2>
            <div class="form-group"><label>昵称</label><input type="text" id="char-name" placeholder="输入昵称"></div>
            <div class="form-group"><label>性别</label>
                <div class="gender-btns">
                    <div class="gender-btn" onclick="selGender(this,'male')">♂ 男性</div>
                    <div class="gender-btn" onclick="selGender(this,'female')">♀ 女性</div>
                    <div class="gender-btn" onclick="selGender(this,'other')">⚥ 其他</div>
                </div>
            </div>
            <button class="btn btn-red" onclick="startChat()">开始恐怖体验</button>
        </div>
    </div>

    <!-- Chat -->
    <div class="screen" id="chat-screen">
        <div class="chat-container">
            <div class="chat-header">
                <span class="chat-title">🏚️ THE 16TH ROOM</span>
                <span id="npc-indicator"></span>
            </div>
            <div class="chat-msgs" id="msgs"></div>
            <div class="chat-input">
                <input type="text" id="msg-input" style="color:#fff !important; background:#333 !important; font-family:inherit;" placeholder="输入您的回应..." onkeypress="if(event.key==='Enter')sendMsg()">
                <button class="btn" onclick="sendMsg()">发送</button>
            </div>
            <div class="chat-controls">
                <button class="btn" style="padding:6px 12px;font-size:0.65rem" onclick="location.reload()">重新开始</button>
                <button class="btn btn-red" style="padding:6px 12px;font-size:0.65rem" onclick="addMsg('ai','房间','你试图逃离，但门已经被锁死了...')">逃离房间</button>
            </div>
        </div>
    </div>

    <div class="loader hidden" id="loader"><div class="spin"></div></div>

    <script>
const qs = [
    {t:"在黑暗的房间里，你更愿意...",a:"找其他人一起探索，互相壮胆",b:"独自静静观察，避免引起注意"},
    {t:"恐怖电影中，你更害怕...",a:"被所有人抛弃，孤立无援",b:"被迫成为众人焦点"},
    {t:"参加聚会时，你通常...",a:"主动与很多人交流",b:"找几个熟悉的人深入交谈"},
    {t:"听到奇怪声音时，你的第一反应是...",a:"仔细分辨声音的来源和性质",b:"想象各种可能的恐怖原因"},
    {t:"面对超自然现象，你更相信...",a:"能看到、听到的具体证据",b:"直觉和第六感的警告"},
    {t:"学习新事物时，你更喜欢...",a:"从具体细节开始学习",b:"先理解整体概念和联系"},
    {t:"面对未知威胁，你倾向于...",a:"冷静分析局势，制定逻辑策略",b:"考虑对所有人的情感影响"},
    {t:"做重要决定时，你更重视...",a:"客观事实和逻辑推理",b:"内心感受和价值观"},
    {t:"批评别人时，你更注重...",a:"指出具体问题和解决方案",b:"考虑对方的感受和自尊"},
    {t:"在危机中，你更喜欢...",a:"按照既定计划行动",b:"灵活应变，适应情况"},
    {t:"在不确定的情况下，你更倾向于...",a:"尽快做出明确决定",b:"保持开放，收集更多信息"},
    {t:"面对变化时，你更...",a:"希望有充分的准备时间",b:"享受变化带来的新鲜感"}
];

let st = {q:0, ans:[], ut:null, nt:null, npc:null, hl:1, name:'', gender:''};
const opp = {'INTJ':'ESFP','INTP':'ESFJ','ENTJ':'ISFP','ENTP':'ISFJ','INFJ':'ESTP','INFP':'ESTJ','ENFJ':'ISTP','ENFP':'ISTJ','ISTJ':'ENFP','ISFJ':'ENTP','ESTJ':'INFP','ESFJ':'INTP','ISTP':'ENFJ','ISFP':'ENTJ','ESTP':'INFJ','ESFP':'INTJ'};
const npcs = {
    ESFP:{n:'The Chaotic Performer',d:'疯狂的表演者',s:'你被困在永不停歇的派对中...'},
    ESFJ:{n:'The Social Enforcer',d:'社交暴君',s:'你在窒息的社交聚会上...'},
    ISFP:{n:'The Passive Saboteur',d:'被动攻击者',s:'你的每个计划都被温柔抵制...'},
    ISFJ:{n:'The Tradition Keeper',d:'传统守护者',s:'你被无数规则包围...'},
    ESTP:{n:'The Reckless Realist',d:'鲁莽的现实主义者',s:'你被困在噪音中...'},
    ESTJ:{n:'The Corporate Overlord',d:'冷酷的企业高管',s:'你在冷酷的办公室里...'},
    ISTP:{n:'The Cold Analyst',d:'冷漠的分析师',s:'你想要帮助的人都拒绝你...'},
    ISTJ:{n:'The Rigid Systematizer',d:'死板的系统管理员',s:'你被困在严格的系统中...'},
    ENFP:{n:'The Chaotic Idealist',d:'混乱的理想主义者',s:'你的计划被混乱打乱...'},
    ENTP:{n:'The Ruthless Debater',d:'无情的辩论家',s:'你的每个举动都被质疑动机...'},
    INFP:{n:'The Sensitive Idealist',d:'敏感的理想主义者',s:'你的每个决定都被质疑道德...'},
    INTP:{n:'The Logical Hermit',d:'逻辑隐士',s:'你的关怀被冷酷分析摧毁...'},
    ENFJ:{n:'The Overbearing Guide',d:'专横的引导者',s:'你被导师控制...'},
    ENTJ:{n:'The Demanding Commander',d:'苛刻的指挥官',s:'你被迫放弃个人价值...'},
    INFJ:{n:'The Prophetic Manipulator',d:'先知操控者',s:'先知不断告诉你注定的失败...'},
    INTJ:{n:'The Master Strategist',d:'主策略师',s:'你被困在系统中，失去自我...'}
};

// Parallax
document.getElementById("start-btn").addEventListener("click", startTest);
document.addEventListener('mousemove', e => {
    const c = document.querySelector('.container');
    if(c) {
        const x = (window.innerWidth/2 - e.clientX) / 50;
        const y = (window.innerHeight/2 - e.clientY) / 50;
        c.style.transform = `translateZ(-20px) rotateY(${x}deg) rotateX(${-y}deg)`;
    }
});

function showScr(n) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(n+'-screen').classList.add('active');
}

function startTest() {
    st.q = 0; st.ans = [];
    showQ();
    showScr('test');
}

function showQ() {
    const q = qs[st.q];
    document.getElementById('q-text').textContent = q.t;
    document.getElementById('counter').textContent = (st.q+1) + ' / ' + qs.length;
    document.getElementById('progress').style.width = ((st.q+1)/qs.length*100) + '%';
    
    const oc = document.getElementById('q-opts');
    oc.innerHTML = '';
    ['a','b'].forEach(k => {
        const b = document.createElement('div');
        b.className = 'option-btn' + (st.ans[st.q]===k ? ' selected' : '');
        b.textContent = (k.toUpperCase()+': ' + q[k]);
        b.onclick = () => selAns(k);
        oc.appendChild(b);
    });
}

function selAns(k) {
    st.ans[st.q] = k;
    document.querySelectorAll('.option-btn').forEach((o,i) => o.classList.toggle('selected', (k==='a'&&i===0)||(k==='b'&&i===1)));
    setTimeout(() => st.q < 11 ? nextQ() : finish(), 350);
}

function nextQ() { if(st.q<11){st.q++;showQ();} }
function prevQ() { if(st.q>0){st.q--;showQ();} }

function finish() {
    let mt='', e=st.ans.filter((a,i)=>i<3&&a==='a').length;
    mt += e>1?'E':'I';
    let s=st.ans.filter((a,i)=>i>=3&&i<6&&a==='a').length;
    mt += s>1?'S':'N';
    let t=st.ans.filter((a,i)=>i>=6&&i<9&&a==='a').length;
    mt += t>1?'T':'F';
    let j=st.ans.filter((a,i)=>i>=9&&a==='a').length;
    mt += j>1?'J':'P';
    st.ut = mt; st.nt = opp[mt]||'ESFP'; st.npc = npcs[st.nt]||npcs.ESFP;
    document.getElementById('u-type').textContent = mt;
    document.getElementById('npc-name').textContent = st.npc.n;
    document.getElementById('npc-desc').textContent = st.npc.d;
    document.getElementById('scenario').textContent = st.npc.s;
    showScr('result');
}

function showChar() { showScr('char'); }

function selGender(el, g) {
    st.gender = g;
    document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
}

function startChat() {
    st.name = document.getElementById('char-name').value.trim() || '陌生人';
    document.getElementById('npc-indicator').textContent = '与 ' + st.npc.n + ' 对话';
    document.getElementById('msgs').innerHTML = '';
    addMsg('ai', st.npc.n, st.npc.s);
    showScr('chat');
}

function addMsg(t, n, c) {
    const d = document.createElement('div');
    d.className = 'chat-msg ' + t;
    d.innerHTML = '<div class="chat-sender">'+n+'</div><div>'+c+'</div>';
    document.getElementById('msgs').appendChild(d);
    document.getElementById('msgs').scrollTop = 9999;
}

async function sendMsg() {
    const inp = document.getElementById('msg-input');
    const m = inp.value.trim();
    if(!m) return;
    addMsg('user', st.name, m);
    inp.value = '';
    document.getElementById('loader').classList.remove('hidden');
    try {
        const r = await fetch('/api/chat', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({message:m, userType:st.ut, npcType:st.nt, horrorLevel:st.hl, userName:st.name, userGender:st.gender})
        });
        const x = await r.json();
        if(x.success) {
            addMsg('ai', st.npc.n, x.message); document.getElementById("loader").classList.add("hidden");
            if(Math.random()<0.3 && st.hl<5) {
                st.hl++;
                addMsg('ai','系统','⚠️ 恐怖等级升至 '+st.hl+'/5');
            }
        }
    } catch(e) { document.getElementById("loader").classList.add("hidden"); addMsg('ai','系统','连接中断'); }
    document.getElementById('loader').classList.add('hidden');
}
    </script>
