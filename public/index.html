<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#8b0000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.minimax.io; font-src 'self' data:;">
    <meta name="description" content="MBTI Horror AI Chat - Personalized Fear Experience">
    <title>The 16th Room - MBTI Horror Experience</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏚️</text></svg>">
</head>
<body>
    <div class="container">
        <!-- 欢迎页面 -->
        <div id="welcome-screen" class="screen active">
            <div class="logo">
                <h1>🏚️ The 16th Room</h1>
                <p class="subtitle">Personalized Horror AI Experience</p>
            </div>
            
            <div class="warning">
                <h3>⚠️ 心理恐怖体验警告</h3>
                <p>本应用将根据您的MBTI人格类型，创造针对性的心理恐怖体验</p>
                <p>如果您有严重的心理健康问题，请谨慎使用</p>
            </div>
            
            <button id="start-btn" class="primary-btn">开始心理测试</button>
        </div>

        <!-- MBTI测试页面 -->
        <div id="test-screen" class="screen">
            <div class="test-container">
                <h2>🧠 MBTI人格检测</h2>
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
                
                <div class="question-container">
                    <h3 id="question-text"></h3>
                    <div class="options" id="question-options"></div>
                </div>
                
                <div class="test-controls">
                    <button id="prev-btn" class="secondary-btn" disabled>上一题</button>
                    <span id="question-counter">1 / 12</span>
                    <button id="next-btn" class="secondary-btn" disabled>下一题</button>
                </div>
            </div>
        </div>

        <!-- 结果页面 -->
        <div id="result-screen" class="screen">
            <div class="result-container">
                <h2>🔮 人格分析完成</h2>
                
                <div class="mbti-result">
                    <div class="user-type">
                        <h3>您的MBTI类型</h3>
                        <div class="type-badge" id="user-type"></div>
                    </div>
                    
                    <div class="arrow">→</div>
                    
                    <div class="npc-type">
                        <h3>恐怖对手</h3>
                        <div class="horror-npc" id="horror-npc">
                            <div class="npc-name" id="npc-name"></div>
                            <div class="npc-desc" id="npc-desc"></div>
                        </div>
                    </div>
                </div>
                
                <div class="scenario" id="scenario"></div>
                
                <button id="create-char-btn" class="primary-btn">创建角色</button>
            </div>
        </div>

        <!-- 角色创建页面 -->
        <div id="char-screen" class="screen">
            <div class="result-container">
                <h2>👤 创建您的角色</h2>
                
                <div class="char-form">
                    <div class="form-group">
                        <label>昵称</label>
                        <input type="text" id="char-name" placeholder="输入你的昵称" maxlength="20">
                    </div>
                    
                    <div class="form-group">
                        <label>性别</label>
                        <div class="gender-options">
                            <div class="gender-btn" data-gender="male">♂ 男性</div>
                            <div class="gender-btn" data-gender="female">♀ 女性</div>
                            <div class="gender-btn" data-gender="other">⚥ 其他</div>
                        </div>
                    </div>
                </div>
                
                <button id="start-chat-btn" class="danger-btn">开始恐怖体验</button>
            </div>
        </div>

        <!-- 聊天房间 -->
        <div id="chat-screen" class="screen">
            <div class="chat-container">
                <div class="chat-header">
                    <div class="room-info">
                        <span class="room-title">🏚️ The 16th Room</span>
                        <span class="npc-indicator" id="current-npc"></span>
                    </div>
                    <div class="horror-level">
                        <span>恐怖等级: </span>
                        <div class="level-indicator" id="horror-level">
                            <span class="level-dots">●●●○○</span>
                        </div>
                    </div>
                </div>
                
                <div class="chat-messages" id="chat-messages"></div>
                
                <div class="chat-input">
                    <input type="text" id="message-input" placeholder="输入您的回应..." autocomplete="off">
                    <button id="send-btn">发送</button>
                </div>
                
                <div class="chat-controls">
                    <button id="restart-btn" class="secondary-btn">重新开始</button>
                    <button id="escape-btn" class="danger-btn">逃离房间</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载提示 -->
    <div id="loading" class="loading hidden">
        <div class="loading-spinner"></div>
        <p>AI正在分析您的恐惧...</p>
    </div>

    <script src="script.js"></script>
</body>
    <script src="script.js"></script>
</body>
</html>
