<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#8b0000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>The 16th Room - MBTI Horror</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg-dark:#0a0a0a; --text-light:#fff; --accent:#ff9500; --panel:rgba(20,20,22,0.95); }
body { background:#0a0a0a; color:#fff; font-family:Segoe UI,Arial; min-height:100vh; overflow:hidden; }
.screen { position:fixed; inset:0; display:none; padding:30px; }
.screen.active { display:flex; flex-direction:column; align-items:center; justify-content:center; }
.container { max-width:500px; width:100%; text-align:center; }
.logo h1 { font-size:2.5rem; color:var(--accent); text-shadow:0 0 20px var(--accent); letter-spacing:0.3em; margin-bottom:10px; }
.logo .subtitle { color:#888; font-size:0.9rem; letter-spacing:0.2em; margin-bottom:30px; }
.warning { background:var(--panel); border:2px solid var(--accent); padding:20px; margin-bottom:30px; border-radius:8px; }
.warning h3 { color:var(--accent); font-size:1.1rem; margin-bottom:12px; }
.warning p { color:#ccc; font-size:0.85rem; line-height:1.6; margin-bottom:8px; }
.primary-btn { padding:14px 40px; background:transparent; border:2px solid var(--accent); color:var(--accent); font-size:1rem; cursor:pointer; border-radius:4px; text-transform:uppercase; letter-spacing:2px; }
.primary-btn:hover { background:var(--accent); color:#000; }
.test-container { width:100%; text-align:center; }
.test-container h2 { color:var(--accent); margin-bottom:20px; }
.progress-bar { width:100%; height:4px; background:rgba(255,149,0,0.2); margin-bottom:20px; }
.progress { height:100%; background:var(--accent); transition:width 0.3s; }
#question-text { font-size:1.1rem; margin-bottom:20px; color:#fff !important; min-height:60px; display:block !important; padding:10px; }
.options { display:flex; flex-direction:column; gap:12px; margin-bottom:20px; }
.option { padding:14px; background:var(--panel); border:1px solid var(--accent); border-radius:6px; cursor:pointer; text-align:left; color:#ddd; }
.option:hover { background:rgba(255,149,0,0.1); }
.option.selected { background:rgba(255,149,0,0.2); color:var(--accent); }
.test-controls { display:flex; justify-content:space-between; margin-top:20px; }
#question-counter { color:var(--accent); }
.result-container { width:100%; text-align:center; }
.mbti-result { display:flex; justify-content:center; align-items:center; gap:20px; margin:20px 0; flex-wrap:wrap; }
.type-badge { font-size:2.5rem; color:var(--accent); }
.npc-name { color:var(--accent); margin-bottom:8px; }
.npc-desc { color:#888; font-size:0.9rem; }
.scenario { background:var(--panel); border-left:3px solid var(--accent); padding:15px; margin:20px 0; text-align:left; font-style:italic; color:#ccc; }
.char-form { text-align:left; margin:20px 0; }
.form-group { margin-bottom:15px; }
.form-group label { display:block; color:var(--accent); margin-bottom:8px; }
.form-group input { width:100%; padding:12px; background:#1a1a1a; border:1px solid var(--accent); color:#fff; border-radius:4px; }
.gender-options { display:flex; gap:10px; }
.gender-btn { flex:1; padding:10px; background:var(--panel); border:1px solid var(--accent); color:#888; cursor:pointer; border-radius:4px; }
.gender-btn.selected { background:rgba(255,149,0,0.2); color:var(--accent); }
.chat-container { max-width:500px; width:100%; height:100vh; display:flex; flex-direction:column; }
.chat-header { display:flex; justify-content:space-between; padding:12px; background:var(--panel); border-bottom:1px solid var(--accent); }
.room-title { color:var(--accent); }
.horror-level { color:var(--accent); }
.level-dots { color:red; }
.chat-messages { flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:12px; }
.message { max-width:85%; padding:12px; border-radius:6px; }
.message.user { background:rgba(255,149,0,0.15); border:1px solid var(--accent); align-self:flex-end; }
.message.ai { background:var(--panel); border:1px solid rgba(255,149,0,0.3); align-self:flex-start; }
.message-sender { color:var(--accent); font-size:0.75rem; margin-bottom:6px; }
.chat-input { display:flex; padding:12px; background:var(--panel); border-top:1px solid var(--accent); }
#message-input { flex:1; padding:10px; background:#1a1a1a; border:1px solid var(--accent); color:#fff; border-radius:4px; }
#send-btn { padding:10px 16px; margin-left:8px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; border-radius:4px; }
.chat-controls { display:flex; justify-content:space-between; padding:10px; background:var(--panel); }
.loading { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; justify-content:center; align-items:center; z-index:999; }
.loading.hidden { display:none; }
@media(max-width:500px){ .logo h1{font-size:1.8rem;} .warning{padding:15px;} }
    </style>
</head>
<body>
    <div class="container">
        <div id="welcome-screen" class="screen active">
            <div class="logo">
                <h1>THE 16TH ROOM</h1>
                <p class="subtitle">PERSONALIZED HORROR AI EXPERIENCE</p>
            </div>
            <div class="warning">
                <h3>⚠️ 心理恐怖体验警告</h3>
                <p>本应用将根据您的MBTI人格类型，创造针对性的心理恐怖体验</p>
                <p>如果您有严重的心理健康问题，请谨慎使用</p>
            </div>
            <button id="start-btn" onclick="startTest()" class="primary-btn">开始心理测试</button>
        </div>
        <div id="test-screen" class="screen">
            <div class="test-container">
                <h2>🧠 MBTI人格检测</h2>
                <div class="progress-bar"><div class="progress" id="progress"></div></div>
                <div id="question-text"></div>
                <div class="options" id="question-options"></div>
                <div class="test-controls">
                    <button id="prev-btn" class="primary-btn" style="padding:8px 20px;font-size:0.8rem">上一题</button>
                    <span id="question-counter">1 / 12</span>
                    <button id="next-btn" class="primary-btn" style="padding:8px 20px;font-size:0.8rem" disabled>下一题</button>
                </div>
            </div>
        </div>
        <div id="result-screen" class="screen">
            <div class="result-container">
                <h2>🔮 人格分析完成</h2>
                <div class="mbti-result">
                    <div class="user-type"><h3>您的MBTI</h3><div class="type-badge" id="user-type"></div></div>
                    <div class="arrow" style="color:var(--accent)">→</div>
                    <div class="npc-type"><h3>恐怖对手</h3><div class="npc-name" id="npc-name"></div><div class="npc-desc" id="npc-desc"></div></div>
                </div>
                <div class="scenario" id="scenario"></div>
                <button id="enter-room-btn" class="primary-btn">进入恐怖房间</button>
            </div>
        </div>
        <div id="char-screen" class="screen">
            <div class="result-container">
                <h2>👤 创建角色</h2>
                <div class="char-form">
                    <div class="form-group"><label>昵称</label><input type="text" id="char-name" placeholder="输入昵称" maxlength="20"></div>
                    <div class="form-group"><label>性别</label><div class="gender-options"><div class="gender-btn" data-gender="male">♂ 男性</div><div class="gender-btn" data-gender="female">♀ 女性</div><div class="gender-btn" data-gender="other">⚥ 其他</div></div></div>
                </div>
                <button id="start-chat-btn" class="primary-btn">开始恐怖体验</button>
            </div>
        </div>
        <div id="chat-screen" class="screen">
            <div class="chat-container">
                <div class="chat-header">
                    <span class="room-title">🏚️ THE 16TH ROOM</span>
                    <span class="npc-indicator" id="current-npc"></span>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="message-input" placeholder="输入您的回应...">
                    <button id="send-btn">发送</button>
                </div>
                <div class="chat-controls">
                    <button id="restart-btn" class="primary-btn" style="padding:6px 12px;font-size:0.7rem">重新开始</button>
                    <button id="escape-btn" class="primary-btn" style="padding:6px 12px;font-size:0.7rem;border-color:red;color:red">逃离房间</button>
                </div>
            </div>
        </div>
    </div>
    <div id="loading" class="loading hidden"><div class="loading-spinner"></div></div>
<script>
const mbtiQuestions=[{t:"在黑暗的房间里，你更愿意...",a:"找其他人一起探索，互相壮胆",b:"独自静静观察，避免引起注意"},{t:"恐怖电影中，你更害怕...",a:"被所有人抛弃，孤立无援",b:"被迫成为众人焦点"},{t:"参加聚会时，你通常...",a:"主动与很多人交流",b:"找几个熟悉的人深入交谈"},{t:"听到奇怪声音时，你的第一反应是...",a:"仔细分辨声音的来源和性质",b:"想象各种可能的恐怖原因"},{t:"面对超自然现象，你更相信...",a:"能看到、听到的具体证据",b:"直觉和第六感的警告"},{t:"学习新事物时，你更喜欢...",a:"从具体细节开始学习",b:"先理解整体概念和联系"},{t:"面对未知威胁，你倾向于...",a:"冷静分析局势，制定逻辑策略",b:"考虑对所有人的情感影响"},{t:"做重要决定时，你更重视...",a:"客观事实和逻辑推理",b:"内心感受和价值观"},{t:"批评别人时，你更注重...",a:"指出具体问题和解决方案",b:"考虑对方的感受和自尊"},{t:"在危机中，你更喜欢...",a:"按照既定计划行动",b:"灵活应变，适应情况"},{t:"在不确定的情况下，你更倾向于...",a:"尽快做出明确决定",b:"保持开放，收集更多信息"},{t:"面对变化时，你更...",a:"希望有充分的准备时间",b:"享受变化带来的新鲜感"}];
let state={currentQuestion:0,answers:[],userType:null,npcType:null,npc:null,horrorLevel:1,userName:'',userGender:''};
const opposites={'INTJ':'ESFP','INTP':'ESFJ','ENTJ':'ISFP','ENTP':'ISFJ','INFJ':'ESTP','INFP':'ESTJ','ENFJ':'ISTP','ENFP':'ISTJ','ISTJ':'ENFP','ISFJ':'ENTP','ESTJ':'INFP','ESFJ':'INTP','ISTP':'ENFJ','ISFP':'ENTJ','ESTP':'INFJ','ESFP':'INTJ'};
const npcNames={ESFP:{n:'The Chaotic Performer',d:'疯狂的表演者，强迫你放弃所有计划，活在混乱当下',s:'你被困在永不停歇的派对中，音乐震耳欲聋...'},ESFJ:{n:'The Social Enforcer',d:'社交暴君，强迫你服从群体规范',s:'你在一个窒息的社交聚会上...'},ISFP:{n:'The Passive Saboteur',d:'被动攻击者，用沉默破坏你的雄心',s:'你的每个计划都被温柔抵制...'},ISFJ:{n:'The Tradition Keeper',d:'传统守护者，用规则束缚你的创新',s:'你被无数规则包围...'},ESTP:{n:'The Reckless Realist',d:'鲁莽的现实主义者，嘲笑你的理想',s:'你被困在噪音中...'},ESTJ:{n:'The Corporate Overlord',d:'冷酷的企业高管，要求你服从系统',s:'你在冷酷的办公室里...'},ISTP:{n:'The Cold Analyst',d:'冷漠的分析师，否定你帮助他人的意义',s:'你想要帮助的人都拒绝你...'},ISTJ:{n:'The Rigid Systematizer',d:'死板的系统管理员，否定你的创意',s:'你被困在严格的系统中...'},ENFP:{n:'The Chaotic Idealist',d:'混乱的理想主义者，强迫你拥抱无序',s:'你的计划被混乱打乱...'},ENTP:{n:'The Ruthless Debater',d:'无情的辩论家，质疑你的善意',s:'你的每个举动都被质疑动机...'},INFP:{n:'The Sensitive Idealist',d:'敏感的理想主义者，用情感质疑你的决定',s:'你的每个决定都被质疑道德...'},INTP:{n:'The Logical Hermit',d:'逻辑隐士，否定你的社交努力',s:'你的关怀被冷酷分析摧毁...'},ENFJ:{n:'The Overbearing Guide',d:'专横的引导者，强迫你按他的方式发展',s:'你被导师控制...'},ENTJ:{n:'The Demanding Commander',d:'苛刻的指挥官，强迫你服从目标',s:'你被迫放弃个人价值...'},INFJ:{n:'The Prophetic Manipulator',d:'先知操控者，用预言控制你的行为',s:'先知不断告诉你注定的失败...'},INTJ:{n:'The Master Strategist',d:'主策略师，用计划否定你的自然表达',s:'你被困在系统中，失去自我...'}};
function showScreen(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(n+'-screen').classList.add('active');}
function startTest(){state.currentQuestion=0;state.answers=[];showQuestion();showScreen('test');}
function showQuestion(){const q=mbtiQuestions[state.currentQuestion];document.getElementById('question-text').textContent=q.t;document.getElementById('question-counter').textContent=(state.currentQuestion+1)+' / '+mbtiQuestions.length;document.getElementById('progress').style.width=((state.currentQuestion+1)/mbtiQuestions.length*100)+'%';const c=document.getElementById('question-options');c.innerHTML='';const b1=document.createElement('div');b1.className='option';b1.textContent='A: '+q.a;b1.onclick=()=>selectAnswer('A');c.appendChild(b1);const b2=document.createElement('div');b2.className='option';b2.textContent='B: '+q.b;b2.onclick=()=>selectAnswer('B');c.appendChild(b2);updateNav();}
function selectAnswer(a){state.answers[state.currentQuestion]=a;document.querySelectorAll('.option').forEach((o,i)=>o.classList.toggle('selected',(a==='A'&&i===0)||(a==='B'&&i===1)));updateNav();setTimeout(()=>{if(state.currentQuestion<mbtiQuestions.length-1){nextQuestion();}else{finishTest();}},300);}
function updateNav(){document.getElementById('prev-btn').disabled=state.currentQuestion===0;const nb=document.getElementById('next-btn');nb.disabled=!state.answers[state.currentQuestion];nb.textContent=state.currentQuestion===mbtiQuestions.length-1?'完成':'下一题';}
function nextQuestion(){if(state.currentQuestion<mbtiQuestions.length-1){state.currentQuestion++;showQuestion();}}
function prevQuestion(){if(state.currentQuestion>0){state.currentQuestion--;showQuestion();}}
function finishTest(){let mbti='';let e=state.answers.filter((a,i)=>i<3&&a==='A').length;mbti+=e>1?'E':'I';let s=state.answers.filter((a,i)=>i>=3&&i<6&&a==='A').length;mbti+=s>1?'S':'N';let t=state.answers.filter((a,i)=>i>=6&&i<9&&a==='A').length;mbti+=t>1?'T':'F';let j=state.answers.filter((a,i)=>i>=9&&a==='A').length;mbti+=j>1?'J':'P';state.userType=mbti;state.npcType=opposites[mbti]||'ESFP';state.npc=npcNames[state.npcType]||npcNames.ESFP;document.getElementById('user-type').textContent=mbti;document.getElementById('npc-name').textContent=state.npc.n;document.getElementById('npc-desc').textContent=state.npc.d;document.getElementById('scenario').textContent=state.npc.s;showScreen('result');}
function enterChat(){showScreen('char');}
function startChat(){const n=document.getElementById('char-name').value.trim()||'陌生人';state.userName=n;document.getElementById('current-npc').textContent='与 '+state.npc.n+' 对话';document.getElementById('chat-messages').innerHTML='';addMessage('ai',state.npc.n,state.npc.s);showScreen('chat');}
function selectGender(g,b){state.userGender=g;document.querySelectorAll('.gender-btn').forEach(o=>o.classList.remove('selected'));b.classList.add('selected');}
function addMessage(s,n,c){const d=document.createElement('div');d.className='message '+s;d.innerHTML='<div class="message-sender">'+n+'</div><div class="message-content">'+c+'</div>';document.getElementById('chat-messages').appendChild(d);document.getElementById('chat-messages').scrollTop=99999;}
async function sendMessage(){const i=document.getElementById('message-input');const m=i.value.trim();if(!m)return;addMessage('user',state.userName||'你',m);i.value='';document.getElementById('loading').classList.remove('hidden');try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m,userType:state.userType,npcType:state.npcType,horrorLevel:state.horrorLevel,userName:state.userName,userGender:state.userGender})});const x=await r.json();if(x.success){addMessage('ai',state.npc.n,x.message);if(Math.random()<0.3&&state.horrorLevel<5){state.horrorLevel++;document.querySelector('.level-dots').textContent='●'.repeat(state.horrorLevel)+'○'.repeat(5-state.horrorLevel);addMessage('ai','系统','⚠️ 恐怖等级升至 '+state.horrorLevel+'/5');}}catch(e){addMessage('ai','系统','连接中断');}document.getElementById('loading').classList.add('hidden');}
window.onload=function(){document.getElementById('start-btn').onclick=startTest;document.getElementById('next-btn').onclick=nextQuestion;document.getElementById('prev-btn').onclick=prevQuestion;document.getElementById('enter-room-btn').onclick=enterChat;document.getElementById('start-chat-btn').onclick=startChat;document.getElementById('send-btn').onclick=sendMessage;document.getElementById('message-input').onkeypress=e=>{if(e.key==='Enter')sendMessage();};document.getElementById('restart-btn').onclick=()=>location.reload();document.getElementById('escape-btn').onclick=()=>addMessage('ai','房间','你试图逃离，但门已经被锁死了...');document.querySelectorAll('.gender-btn').forEach(b=>b.onclick=function(){selectGender(this.dataset.gender,this);});};
</script>
</body>
</html>
